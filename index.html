        }
        .hero p { font-size: 1.3em; color: #ccc; max-width: 600px; margin: 0 auto; }
        
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            padding: 60px 20px;
        }
        .feature-card {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #333;
        }
        .feature-card h3 { color: #7c3aed; margin-bottom: 15px; }
        
        footer {
            text-align: center;
            padding: 40px 20px;
            border-top: 1px solid #333;
            color: #888;
        }
    </style>
</head>
